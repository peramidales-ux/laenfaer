services:
  - type: web
    name: laenfaer-vpn
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node --enable-source-maps ./dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.mail.ru
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: REDACTED_EMAIL
      - key: SMTP_PASS
        value: REDACTED_SMTP_PASS
      - key: SMTP_SECURE
        value: "true"
